<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AW Solutions</title>
    <style>
        /* Style agar gambar di halaman tidak terpotong */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* Ini kuncinya biar tinggi menyesuaikan, tidak terpotong */
            display: block;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.02);
        }

        /* Style untuk tampilan saat diklik (Lightbox) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain; /* Ini biar gambar utuh saat diperbesar */
            border: 5px solid white;
            border-radius: 4px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-top: 30px; font-size: 2.5em;">PORTFOLIO KAMI</h1>

    <div class="gallery">
        <!-- Gambar 1 -->
        <div class="gallery-item" onclick="openLightbox('Majalah 01.jpg')">
            <img src="Majalah 01.jpg" alt="Desain AW Solutions">
        </div>

        <!-- Gambar 2 -->
        <div class="gallery-item" onclick="openLightbox('Majalah 02.jpg')">
            <img src="Majalah 02.jpg" alt="Desain AW Solutions">
        </div>

        <!-- Gambar 3 -->
        <div class="gallery-item" onclick="openLightbox('Majalah 03.jpg')">
            <img src="Majalah 03.jpg" alt="Desain AW Solutions">
        </div>

        <!-- Gambar 4 -->
        <div class="gallery-item" onclick="openLightbox('Majalah 04.jpg')">
            <img src="Majalah 04.jpg" alt="Desain AW Solutions">
        </div>

        <!-- Gambar 5 -->
        <div class="gallery-item" onclick="openLightbox('Majalah 05.jpg')">
            <img src="Majalah 05.jpg" alt="Desain AW Solutions">
        </div>
    </div>

    <!-- Kotak untuk menampilkan gambar besar -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lightbox-img').src = src;
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

</body>
</html>
