<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - AW Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        biruTua: '#0A2463',
                        kuning: '#F3D278',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            /* Gaya Judul */
            .judul-portofolio {
                @apply text-[clamp(2.5rem,8vw,4rem)] font-black text-biruTua text-center;
            }
            /* Garis bawah judul */
            .garis-pemisah {
                @apply w-32 h-1.5 bg-kuning mx-auto mt-2 mb-10;
            }
            /* Gaya Bingkai Foto (Model Potrait) */
            .bingkai-foto {
                @apply flex flex-col border-[5px] border-kuning rounded-sm overflow-hidden w-full;
                aspect-ratio: 3 / 4; /* Perbandingan ukuran vertikal */
            }
            /* Area untuk gambar */
            .area-gambar {
                @apply flex-grow bg-gray-100 overflow-hidden;
            }
            /* Bagian bawah untuk ikon dan teks */
            .bagian-info {
                @apply bg-kuning text-biruTua font-medium text-lg py-3 px-4 w-full flex items-center gap-3;
            }
            /* Kontainer utama untuk layar HP */
            .kontainer-hp {
                @apply max-w-md mx-auto px-4 py-8;
            }
        }
    </style>
</head>
