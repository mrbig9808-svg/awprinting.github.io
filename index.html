<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 1200px;
        }
        .header {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #002244;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .item {
            background-color: #f7f7f7;
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        .item img {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
        }
        .item .details {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            background-color: #f2e185;
            padding: 5px;
            border-radius: 5px;
        }
        .item .details span {
            margin-left: 5px;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Portofolio</div>
        <div class="grid">
            <div class="item">
                <img src="path_ke_gambar1.jpg" alt="Furniture 1">
                <div class="details">
                    <span>Lihat Detail</span>
                </div>
            </div>
            <div class="item">
                <img src="path_ke_gambar2.jpg" alt="Furniture 2">
                <div class="details">
                    <span>Lihat Detail</span>
                </div>
            </div>
            <div class="item">
                <img src="path_ke_gambar3.jpg" alt="Furniture 3">
                <div class="details">
                    <span>Lihat Detail</span>
                </div>
            </div>
            <div class="item">
                <img src="path_ke_gambar4.jpg" alt="Furniture 4">
                <div class="details">
                    <span>Lihat Detail</span>
                </div>
            </div>
            </div>
    </div>
</body>
</html>
