<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Furnitur</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            width: 100%;
            max-width: 480px; /* Ukuran maksimal untuk tampilan potret HP */
        }
        .portfolio-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #002D62; /* Warna judul Portofolio */
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .portfolio-item {
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .portfolio-image {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1; /* Mempertahankan proporsi kotak */
            object-fit: cover;
            object-position: center;
        }
        .portfolio-info {
            background-color: #F8E5A7; /* Warna latar kuning */
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: start;
        }
        .portfolio-info img {
            width: 20px; /* Ukuran ikon mata */
            margin-right: 5px;
        }
        .portfolio-info span {
            font-size: 14px;
            color: #333;
        }
        .copyright-box {
            background-color: #002D62; /* Warna latar biru */
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
        }
        .copyright-text {
            color: #F8E5A7; /* Warna teks kuning */
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>
