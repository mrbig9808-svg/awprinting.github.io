<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Furnitur</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        /* Judul Portofolio Atas */
        .title {
            text-align: center;
            color: #0d47a1;
            font-size: 36px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Grid 3 Kolom */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; /* Spasi putih antar kotak dirapatkan */
            margin-bottom: 30px;
        }

        /* Kotak Portofolio */
        .portfolio-item {
            border: 2px solid #ffcc00;
            border-radius: 4px;
            background-color: #fff;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Area Foto (Tanpa tulisan furnitur di atasnya) */
        .photo-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #ddd;
            margin-bottom: 10px;
            border-radius: 2px;
        }

        /* Tombol Lihat Detail */
        .detail-button {
            background-color: #ffcc00;
            color: #000;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 5px;
            box-sizing: border-box;
        }

        .eye-icon {
            width: 18px;
            height: 18px;
            margin-right: 5px;
        }

        /* Footer Biru Full Lebar */
        footer {
            background-color: #0d47a1;
            color: #ffcc00;
            text-align: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        footer p {
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="title">Portofolio</h1>

        <div class="portfolio-grid">
            <script>
                for (let i = 1; i <= 12; i++) {
                    document.write(`
                        <div class="portfolio-item">
                            <div class="photo-placeholder"></div>
                            <a href="#" class="detail-button">
                                <img src="https://img.icons8.com/material-outlined/24/000000/visible.png" class="eye-icon">
                                Lihat Detail
                            </a>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <footer>
        <p>Hak Cipta © 2024 Portofolio Furnitur. Semua Hak Dilindungi.</p>
    </footer>

</body>
</html>
